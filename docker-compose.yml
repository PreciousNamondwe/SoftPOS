# /workspaces/SoftPOS/docker-compose.yml
version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: lomis_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lomis
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: